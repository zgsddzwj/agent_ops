name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
    
    - name: Run Ruff linting
      run: |
        ruff check .
      
    - name: Run Ruff formatting
      run: |
        ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: agentops
          POSTGRES_USER: agentops
          POSTGRES_DB: agentops
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e packages/agent-ops-sdk
        pip install -e packages/agent-ops-cli  
        pip install -e backend
        pip install -e worker
        pip install pytest pytest-asyncio httpx
    
    - name: Wait for PostgreSQL
      run: |
        until pg_isready -h localhost -p 5432 -U agentops; do
          sleep 1
        done
    
    - name: Run tests
      env:
        DATABASE_URL: postgresql+asyncpg://agentops:agentops@localhost:5432/agentops
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest tests/ -v --cov=.

  frontend-lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json
    
    - name: Install frontend dependencies
      run: |
        cd web
        npm ci
    
    - name: Run TypeScript check
      run: |
        cd web
        npm run build

  docker-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker images
      uses: docker/build-push-action@v5
      with:
        context: .
        file: infra/Dockerfile.backend
        tags: agentops-backend:ci
        load: true
    
    - name: Build frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./web/
        file: ../infra/Dockerfile.web
        tags: agentops-web:ci
        load: true