[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "ANN", # flake8-annotations
    "ASYNC", # flake8-async
    "S",   # flake8-bandit (security)
    "BLE", # flake8-blind-except
    "FBT", # flake8-boolean-trap
    "A",   # flake8-builtins
    "COM", # flake8-commas
    "C90", # mccabe complexity
    "DJ",  # flake8-django
    "EM",  # flake8-errmsg
    "EXE", # flake8-executable
    "ISC", # flake8-implicit-str-concat
    "ICN", # flake8-import-conventions
    "G",   # flake8-logging-format
    "INP", # flake8-no-pep420
    "PIE", # flake8-pie
    "T20", # flake8-print
    "PYI", # flake8-pyi
    "PT",  # flake8-pytest-style
    "Q",   # flake8-quotes
    "RSE", # flake8-raise
    "RET", # flake8-return
    "SLF", # flake8-self
    "SLOT", # flake8-slots
    "SIM", # flake8-simplification
    "TID", # flake8-tidy-imports
    "TCH", # flake8-type-checking
    "INT", # flake8-gettext
    "ARG", # flake8-unused-arguments
    "PTH", # flake8-use-pathlib
    "TD",  # flake8-todos
    "FIX", # flake8-fixme
    "ERA", # eradicate
    "PD",  # pandas-vet
    "PGH", # pygrep-hooks
    "PL",  # pylint
    "TRY", # tryceratops
    "FLY", # flynt
    "NPY", # numpy
    "AIR", # airbnb
    "PERF", # perflint
    "FURB", # refurb
    "LOG", # flake8-logging
]
ignore = [
    "ANN101",  # Missing type annotation for self in method
    "ANN102",  # Missing type annotation for cls in classmethod
    "ANN401",  # Dynamically typed expressions (typing.Any) are disallowed
    "COM812",  # Trailing comma missing
    "COM819",  # Prohibited trailing comma
    "ISC001",  # Implicit string concatenation
    "ISC002",  # Implicit string concatenation
    "E501",    # Line too long (handled by formatter)
]
fixable = [
    "A", "B", "C", "D", "E", "F", "G", "I", "N", "Q", "S", "T", "W",
    "ANN", "ASYNC", "BLE", "C4", "COM", "DJ", "DTZ", "EM", "EXE", "FBT",
    "FLY", "G", "ICN", "INP", "INT", "ISC", "LOG", "N", "NPY", "PD",
    "PIE", "PL", "PT", "PTH", "PYI", "Q", "RET", "RSE", "RUF", "S",
    "SIM", "SLF", "SLOT", "TCH", "TD", "TID", "TRY", "UP", "YTT"
]
unfixable = []
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
    "migrations",
    "alembic",
]
per-file-ignores = {}
mccabe.max-complexity = 10

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[lint.isort]
known-first-party = ["agent_ops", "app"]
known-third-party = ["fastapi", "sqlalchemy", "pydantic", "alembic"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]
combine-as-imports = true
split-on-trailing-comma = true

[lint.flake8-annotations]
match = "(tool|test_.*|conftest_.*|stub|.*_stub|.*_stub_.*)"
match-strict = true
suppress-none-returning = false
suppress-dummy-args = false
allow-star-arg-any = false

[lint.flake8-bugbear]
extend-immutable-calls = []

[lint.flake8-quotes]
docstring-style = "double"
inline-quote-style = "double"
multiline-quote-style = "double"

[lint.pylint]
max-args = 8
max-branches = 15
max-locals = 15
max-returns = 6
max-statements = 50